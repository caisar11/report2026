<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주요부서 업무 현황 보고</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: '맑은 고딕', Malgun Gothic, sans-serif; background: #f0f4f8; min-height: 100vh; }
.header { background: #1a3a6b; color: white; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
.header-title { font-size: 17px; font-weight: 700; }
.header-sub { font-size: 12px; opacity: 0.75; margin-top: 3px; }
.tabs { background: white; border-bottom: 2px solid #e5e7eb; display: flex; padding: 0 20px; }
.tab { padding: 13px 18px; cursor: pointer; font-size: 13px; font-weight: 600; color: #6b7280; border-bottom: 3px solid transparent; margin-bottom: -2px; transition: 0.2s; white-space: nowrap; }
.tab.active { color: #1a3a6b; border-bottom-color: #1a3a6b; }
.tab:hover:not(.active) { color: #374151; }
.container { max-width: 1000px; margin: 0 auto; padding: 20px; }
.card { background: white; border-radius: 12px; padding: 22px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.card h3 { font-size: 14px; font-weight: 700; color: #1a3a6b; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 2px solid #e5e7eb; display: flex; align-items: center; gap: 8px; }
.btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; transition: 0.2s; }
.btn-primary { background: #2563eb; color: white; } .btn-primary:hover { background: #1d4ed8; }
.btn-success { background: #16a34a; color: white; } .btn-success:hover { background: #15803d; }
.btn-danger { background: #ef4444; color: white; } .btn-danger:hover { background: #dc2626; }
.btn-gray { background: #f3f4f6; color: #374151; } .btn-gray:hover { background: #e5e7eb; }
.btn-sm { padding: 5px 11px; font-size: 12px; }
.btn-xs { padding: 3px 8px; font-size: 11px; }
label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 5px; margin-top: 12px; }
label:first-child { margin-top: 0; }
input[type=text], input[type=date], textarea {
  width: 100%; padding: 9px 12px; border: 1.5px solid #d1d5db; border-radius: 8px;
  font-size: 13px; font-family: inherit; transition: 0.2s;
}
input:focus, textarea:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
textarea { resize: vertical; min-height: 75px; }
input[type=date] { cursor: pointer; }
.round-list { display: flex; flex-direction: column; gap: 10px; }
.round-item { border: 2px solid #e5e7eb; border-radius: 10px; padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: 0.2s; background: white; }
.round-item:hover { border-color: #93c5fd; background: #f8faff; }
.round-item.active-round { border-color: #1a3a6b; background: #eff6ff; }
.round-badge { font-size: 11px; font-weight: 700; padding: 2px 9px; border-radius: 20px; margin-right: 10px; }
.badge-ongoing { background: #dcfce7; color: #16a34a; }
.badge-closed { background: #f3f4f6; color: #9ca3af; }
.round-title { font-size: 14px; font-weight: 700; color: #1f2937; }
.round-period { font-size: 12px; color: #6b7280; margin-top: 2px; }
.round-stat { font-size: 12px; color: #6b7280; }
.round-actions { display: flex; gap: 6px; align-items: center; }
.active-banner { background: #1a3a6b; color: white; border-radius: 10px; padding: 12px 18px; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }
.active-banner .round-name { font-size: 14px; font-weight: 700; }
.active-banner .round-per { font-size: 12px; opacity: 0.8; margin-top: 2px; }
.team-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 10px; }
.team-card { background: white; border: 2px solid #e5e7eb; border-radius: 10px; padding: 14px; cursor: pointer; transition: 0.2s; }
.team-card:hover { border-color: #2563eb; background: #eff6ff; }
.team-card.selected { border-color: #1a3a6b; background: #eff6ff; box-shadow: 0 0 0 3px rgba(26,58,107,0.12); }
.team-card .dept { font-size: 11px; color: #6b7280; margin-bottom: 3px; }
.team-card .tname { font-size: 13px; font-weight: 700; color: #1f2937; }
.team-card .tstatus { font-size: 11px; margin-top: 6px; padding: 2px 8px; border-radius: 20px; display: inline-block; }
.status-done { background: #dcfce7; color: #16a34a; }
.status-none { background: #f3f4f6; color: #9ca3af; }
.section-badge { color: white; font-size: 11px; padding: 2px 8px; border-radius: 4px; }
.badge-pres { background: #1a3a6b; }
.badge-self { background: #059669; }
.task-item { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px; padding: 13px; margin-bottom: 9px; }
.task-item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 9px; }
.task-item-header span { font-size: 12px; font-weight: 700; color: #6b7280; }
.btn-del { background: #fee2e2; color: #dc2626; border: none; border-radius: 4px; padding: 3px 8px; font-size: 11px; cursor: pointer; }
.btn-add { background: #eff6ff; color: #2563eb; border: 1.5px dashed #93c5fd; border-radius: 8px; padding: 9px; width: 100%; font-size: 13px; font-weight: 600; cursor: pointer; margin-top: 7px; transition: 0.2s; }
.btn-add:hover { background: #dbeafe; }
.form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }
.report-wrap { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.report-head { background: #1a3a6b; color: white; padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; }
.report-head h2 { font-size: 14px; font-weight: 700; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { background: #f1f5f9; color: #374151; font-weight: 700; padding: 11px 14px; text-align: left; border-bottom: 2px solid #e5e7eb; }
td { padding: 13px 14px; border-bottom: 1px solid #f1f5f9; vertical-align: top; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #fafafa; }
.task-list { list-style: none; }
.task-list li { margin-bottom: 7px; }
.task-title-text { font-weight: 700; color: #1f2937; }
.task-detail { color: #6b7280; font-size: 12px; margin-top: 2px; white-space: pre-wrap; }
.empty-cell { color: #d1d5db; font-size: 12px; }
.report-note-text { color: #374151; font-size: 13px; white-space: pre-wrap; }
.filter-bar { background: white; border-radius: 10px; padding: 12px 18px; margin-bottom: 14px; display: flex; gap: 10px; align-items: center; box-shadow: 0 1px 4px rgba(0,0,0,0.06); flex-wrap: wrap; }
.no-data { text-align: center; padding: 44px; color: #9ca3af; }
.section-title { font-size: 15px; font-weight: 700; color: #1f2937; margin-bottom: 14px; }
.toast { position: fixed; bottom: 22px; right: 22px; color: white; padding: 11px 18px; border-radius: 8px; font-size: 13px; z-index: 999; animation: slideup 0.3s ease; }
.toast-ok { background: #1f2937; }
.toast-err { background: #dc2626; }
@keyframes slideup { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.period-preview { font-size: 13px; color: #2563eb; font-weight: 600; min-height: 20px; margin-top: 8px; }
.empty-round { text-align: center; padding: 36px; color: #9ca3af; font-size: 14px; }
.spinner { display: inline-block; width: 13px; height: 13px; border: 2px solid rgba(255,255,255,0.5); border-top-color: white; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 5px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading { text-align: center; padding: 40px; color: #9ca3af; }
@media print {
  .tabs, .filter-bar, .form-actions, .btn, .header, .active-banner { display: none !important; }
  body { background: white; }
}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">📋 주요부서 업무 현황 보고</div>
    <div class="header-sub" id="headerSub">차수를 선택하거나 새로 만들어 주세요</div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" id="tab-rounds" onclick="showTab('rounds')">📁 차수 관리</div>
  <div class="tab" id="tab-input" onclick="showTab('input')">✏️ 업무 입력</div>
  <div class="tab" id="tab-report" onclick="showTab('report')">📊 통합 보고서</div>
</div>

<!-- 차수 관리 탭 -->
<div id="page-rounds" class="container">
  <div class="card">
    <h3>➕ 새 차수 만들기</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <div>
        <label>차수명</label>
        <input type="text" id="newRoundName" placeholder="예: 2026년 제1차">
      </div>
      <div></div>
      <div>
        <label>시작일</label>
        <input type="date" id="newStart" onchange="updateNewPreview()">
      </div>
      <div>
        <label>종료일</label>
        <input type="date" id="newEnd" onchange="updateNewPreview()">
      </div>
    </div>
    <div class="period-preview" id="newPreview"></div>
    <div style="margin-top:14px;">
      <button class="btn btn-primary" id="createBtn" onclick="createRound()">차수 생성</button>
    </div>
  </div>
  <div class="section-title">차수 목록</div>
  <div class="round-list" id="roundList"><div class="loading">⏳ 불러오는 중...</div></div>
</div>

<!-- 업무 입력 탭 -->
<div id="page-input" class="container" style="display:none;">
  <div id="inputNoRound" class="no-data">📁 먼저 차수 관리 탭에서 차수를 선택해 주세요.</div>
  <div id="inputMain" style="display:none;">
    <div class="active-banner">
      <div>
        <div class="round-name" id="bannerName"></div>
        <div class="round-per" id="bannerPeriod"></div>
      </div>
    </div>
    <div class="section-title">팀/실 선택</div>
    <div class="team-grid" id="teamGrid"></div>
    <div id="inputForm" style="display:none; margin-top:20px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
        <div class="section-title" id="formTitle" style="margin:0;font-size:14px;"></div>
        <button class="btn btn-sm btn-gray" onclick="deselectTeam()">← 팀 변경</button>
      </div>
      <div class="card">
        <h3>◉ 총장 지시 업무 <span class="section-badge badge-pres">지시</span></h3>
        <div id="presidentTasks"></div>
        <button class="btn-add" onclick="addTask('president')">+ 업무 추가</button>
      </div>
      <div class="card">
        <h3>◉ 자체 추진 업무 <span class="section-badge badge-self">자체</span></h3>
        <div id="selfTasks"></div>
        <button class="btn-add" onclick="addTask('self')">+ 업무 추가</button>
      </div>
      <div class="card">
        <h3>📌 보고사항 <span style="font-size:11px;color:#9ca3af;font-weight:400;">(선택)</span></h3>
        <textarea id="reportNote" placeholder="보고사항이 있을 시 입력 (없으면 비워두세요)"></textarea>
      </div>
      <div class="form-actions">
        <button class="btn btn-success" id="saveBtn" onclick="saveReport()">💾 저장</button>
      </div>
    </div>
  </div>
</div>

<!-- 통합 보고서 탭 -->
<div id="page-report" class="container" style="display:none;">
  <div id="reportNoRound" class="no-data">📁 먼저 차수 관리 탭에서 차수를 선택해 주세요.</div>
  <div id="reportMain" style="display:none;">
    <div class="filter-bar">
      <span style="font-weight:700;color:#1a3a6b;" id="reportBannerName"></span>
      <span style="font-size:12px;color:#6b7280;" id="reportBannerPeriod"></span>
      <div style="margin-left:auto;display:flex;gap:8px;">
        <button class="btn btn-sm btn-primary" onclick="renderReport()">🔄 새로고침</button>
        <button class="btn btn-sm btn-gray" onclick="window.print()">🖨️ 인쇄</button>
      </div>
    </div>
    <div class="report-wrap">
      <div class="report-head">
        <h2>주요부서 팀/실 업무 현황 보고</h2>
        <span style="font-size:12px;opacity:0.8;" id="reportHeadPeriod"></span>
      </div>
      <div id="reportBody"><div class="no-data">📭 아직 제출된 보고가 없습니다.</div></div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, getDocs, deleteDoc, collection, orderBy, query }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDGK8WEACd6jX8DYIphfWkFGsUdd6tuipM",
  authDomain: "report2026-1f072.firebaseapp.com",
  projectId: "report2026-1f072",
  storageBucket: "report2026-1f072.firebasestorage.app",
  messagingSenderId: "532622243453",
  appId: "1:532622243453:web:a24884b6570baac6dd6314"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const TEAMS = [
  { dept: "대외협력처", name: "홍보실" },
  { dept: "건학120주년 기념사업단", name: "기념사업 추진팀" },
  { dept: "기획처", name: "기획예산실" },
  { dept: "총무처", name: "총무인사팀" },
  { dept: "관리처", name: "시설안전팀" },
  { dept: "관리처", name: "로터스관건설팀" },
  { dept: "국제처", name: "글로벌교류팀" },
  { dept: "국제처", name: "글로벌학생팀" },
  { dept: "대학원", name: "대학원실" },
  { dept: "교무처", name: "교육기획팀" },
  { dept: "교원인사처", name: "교원인사실" },
  { dept: "연구기획본부", name: "연구기획팀" },
];

const DAYS = ['일','월','화','수','목','금','토'];
let rounds = [];        // [{ id, name, start, end, submittedCount }]
let activeRoundId = null;
let activeReports = {}; // teamKey -> data (현재 차수 reports 캐시)
let selectedTeam = null;

function teamKey(t) { return (t.dept + '_' + t.name).replace(/\s/g,'_'); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function formatDate(val) {
  if (!val) return '';
  const d = new Date(val);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}.(${DAYS[d.getDay()]})`;
}
function getActive() { return rounds.find(r => r.id === activeRoundId) || null; }

function showToast(msg, err) {
  const el = document.createElement('div');
  el.className = 'toast ' + (err ? 'toast-err' : 'toast-ok');
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function setBtnLoading(id, loading, label) {
  const btn = document.getElementById(id);
  if (!btn) return;
  btn.disabled = loading;
  btn.innerHTML = loading ? `<span class="spinner"></span>처리 중...` : label;
}

// ─── Firestore: 차수 목록 로드 ───────────────────────────
async function loadRounds() {
  try {
    const q = query(collection(db, "rounds"), orderBy("createdAt", "desc"));
    const snap = await getDocs(q);
    rounds = [];
    snap.forEach(d => rounds.push({ id: d.id, ...d.data() }));
  } catch(e) {
    // orderBy 인덱스 없을 경우 fallback
    try {
      const snap = await getDocs(collection(db, "rounds"));
      rounds = [];
      snap.forEach(d => rounds.push({ id: d.id, ...d.data() }));
      rounds.sort((a,b) => (b.createdAt||'') > (a.createdAt||'') ? 1 : -1);
    } catch(e2) {
      showToast('차수 목록 로드 실패: ' + e2.message, true);
    }
  }
  renderRoundList();
}

// ─── Firestore: 차수 생성 ────────────────────────────────
window.updateNewPreview = function() {
  const s = document.getElementById('newStart').value;
  const e = document.getElementById('newEnd').value;
  document.getElementById('newPreview').textContent = (s && e) ? `📋 ${formatDate(s)} ~ ${formatDate(e)}` : '';
}

window.createRound = async function() {
  const name = document.getElementById('newRoundName').value.trim();
  const s = document.getElementById('newStart').value;
  const e = document.getElementById('newEnd').value;
  if (!name) { showToast('차수명을 입력해 주세요.'); return; }
  if (!s || !e) { showToast('기간을 선택해 주세요.'); return; }
  if (s > e) { showToast('종료일이 시작일보다 빠릅니다.'); return; }

  setBtnLoading('createBtn', true);
  const id = 'r' + Date.now();
  const data = { name, start: formatDate(s), end: formatDate(e), createdAt: new Date().toISOString() };
  try {
    await setDoc(doc(db, "rounds", id), data);
    rounds.unshift({ id, ...data });
    document.getElementById('newRoundName').value = '';
    document.getElementById('newStart').value = '';
    document.getElementById('newEnd').value = '';
    document.getElementById('newPreview').textContent = '';
    renderRoundList();
    showToast('✅ ' + name + ' 차수가 생성되었습니다.');
  } catch(e) { showToast('생성 실패: ' + e.message, true); }
  setBtnLoading('createBtn', false, '차수 생성');
}

// ─── Firestore: 차수 삭제 ────────────────────────────────
window.deleteRound = async function(id) {
  const r = rounds.find(x => x.id === id);
  if (!confirm(`"${r.name}" 차수를 삭제하시겠습니까?\n입력된 데이터도 모두 삭제됩니다.`)) return;
  try {
    // 하위 reports 삭제
    const snap = await getDocs(collection(db, "rounds", id, "reports"));
    for (const d of snap.docs) await deleteDoc(doc(db, "rounds", id, "reports", d.id));
    await deleteDoc(doc(db, "rounds", id));
    rounds = rounds.filter(x => x.id !== id);
    if (activeRoundId === id) { activeRoundId = null; activeReports = {}; }
    renderRoundList();
    updateBanners();
    showToast('🗑️ 삭제되었습니다.');
  } catch(e) { showToast('삭제 실패: ' + e.message, true); }
}

// ─── 차수 선택 ───────────────────────────────────────────
window.selectRound = async function(id) {
  activeRoundId = id;
  selectedTeam = null;
  activeReports = {};
  // 해당 차수 reports 캐시 로드
  try {
    const snap = await getDocs(collection(db, "rounds", id, "reports"));
    snap.forEach(d => { activeReports[d.id] = d.data(); });
  } catch(e) { console.warn(e); }
  renderRoundList();
  updateBanners();
  showToast('📁 ' + getActive().name + ' 차수가 선택되었습니다.');
}

function renderRoundList() {
  const el = document.getElementById('roundList');
  if (!rounds.length) {
    el.innerHTML = '<div class="empty-round">📭 아직 생성된 차수가 없습니다.<br>위에서 새 차수를 만들어 주세요.</div>';
    return;
  }
  el.innerHTML = rounds.map(r => {
    const isActive = r.id === activeRoundId;
    const done = r.submittedCount || 0;
    return `<div class="round-item ${isActive ? 'active-round' : ''}" onclick="selectRound('${r.id}')">
      <div>
        <div style="display:flex;align-items:center;">
          <span class="round-badge ${isActive ? 'badge-ongoing' : 'badge-closed'}">${isActive ? '● 선택중' : '○ 선택'}</span>
          <span class="round-title">${esc(r.name)}</span>
        </div>
        <div class="round-period">📅 ${esc(r.start)} ~ ${esc(r.end)}</div>
      </div>
      <div class="round-actions">
        <span class="round-stat">${Object.keys(activeRoundId===r.id ? activeReports : {}).length||done}/${TEAMS.length}팀 제출</span>
        <button class="btn btn-xs btn-danger" onclick="event.stopPropagation();deleteRound('${r.id}')">삭제</button>
      </div>
    </div>`;
  }).join('');
}

function updateBanners() {
  const r = getActive();
  if (r) {
    document.getElementById('inputNoRound').style.display = 'none';
    document.getElementById('inputMain').style.display = 'block';
    document.getElementById('bannerName').textContent = '📁 ' + r.name;
    document.getElementById('bannerPeriod').textContent = r.start + ' ~ ' + r.end;
    document.getElementById('headerSub').textContent = r.name + ' · ' + r.start + ' ~ ' + r.end;
    document.getElementById('reportNoRound').style.display = 'none';
    document.getElementById('reportMain').style.display = 'block';
    document.getElementById('reportBannerName').textContent = r.name;
    document.getElementById('reportBannerPeriod').textContent = r.start + ' ~ ' + r.end;
    document.getElementById('reportHeadPeriod').textContent = r.start + ' ~ ' + r.end;
    renderTeamGrid();
  } else {
    document.getElementById('inputNoRound').style.display = 'block';
    document.getElementById('inputMain').style.display = 'none';
    document.getElementById('reportNoRound').style.display = 'block';
    document.getElementById('reportMain').style.display = 'none';
    document.getElementById('headerSub').textContent = '차수를 선택하거나 새로 만들어 주세요';
  }
  document.getElementById('inputForm').style.display = 'none';
  selectedTeam = null;
}

// ─── 팀 그리드 ───────────────────────────────────────────
function renderTeamGrid() {
  document.getElementById('teamGrid').innerHTML = TEAMS.map((t, i) => {
    const done = !!activeReports[teamKey(t)];
    return `<div class="team-card ${selectedTeam===i?'selected':''}" onclick="selectTeam(${i})">
      <div class="dept">${esc(t.dept)}</div>
      <div class="tname">${esc(t.name)}</div>
      <span class="tstatus ${done?'status-done':'status-none'}">${done?'✅ 제출완료':'미제출'}</span>
    </div>`;
  }).join('');
}

window.selectTeam = async function(i) {
  if (!activeRoundId) return;
  selectedTeam = i;
  const t = TEAMS[i];
  document.getElementById('formTitle').textContent = '✏️ ' + t.dept + ' ' + t.name;
  document.getElementById('inputForm').style.display = 'block';
  document.getElementById('inputForm').scrollIntoView({ behavior: 'smooth' });
  renderTeamGrid();
  // Firestore에서 최신 데이터 로드
  try {
    const snap = await getDoc(doc(db, "rounds", activeRoundId, "reports", teamKey(t)));
    const d = snap.exists() ? snap.data() : {};
    activeReports[teamKey(t)] = d;
    renderTasks('president', d.presidentTasks || []);
    renderTasks('self', d.selfTasks || []);
    document.getElementById('reportNote').value = d.reportNote || '';
  } catch(e) {
    renderTasks('president', []);
    renderTasks('self', []);
    document.getElementById('reportNote').value = '';
  }
}

window.deselectTeam = function() {
  selectedTeam = null;
  document.getElementById('inputForm').style.display = 'none';
  renderTeamGrid();
}

function renderTasks(type, tasks) {
  const c = document.getElementById(type + 'Tasks');
  c.innerHTML = '';
  if (!tasks.length) { addTask(type); return; }
  tasks.forEach(task => addTask(type, task.title, task.detail));
}

window.addTask = function(type, title, detail) {
  title = title||''; detail = detail||'';
  const c = document.getElementById(type + 'Tasks');
  const id = 't' + Date.now() + Math.random().toString(36).slice(2);
  const num = c.children.length + 1;
  const div = document.createElement('div');
  div.className = 'task-item'; div.id = id;
  div.innerHTML = `<div class="task-item-header">
    <span>▪ 업무 ${num}</span>
    <button class="btn-del" onclick="document.getElementById('${id}').remove()">삭제</button>
  </div>
  <label>업무명</label>
  <input type="text" class="task-title-input" placeholder="예: MetaPlan120 진행상황 점검" value="${esc(title)}">
  <label>세부내용 / 일정</label>
  <textarea class="task-detail-input" placeholder="일정 및 세부내용 기술">${esc(detail)}</textarea>`;
  c.appendChild(div);
}

window.saveReport = async function() {
  if (!activeRoundId || selectedTeam === null) return;
  const t = TEAMS[selectedTeam];
  const collect = type => [...document.getElementById(type+'Tasks').querySelectorAll('.task-item')]
    .map(el => ({ title: el.querySelector('.task-title-input').value.trim(), detail: el.querySelector('.task-detail-input').value.trim() }))
    .filter(x => x.title);

  const data = {
    dept: t.dept, teamName: t.name,
    presidentTasks: collect('president'),
    selfTasks: collect('self'),
    reportNote: document.getElementById('reportNote').value.trim(),
    updatedAt: new Date().toISOString()
  };

  setBtnLoading('saveBtn', true);
  try {
    await setDoc(doc(db, "rounds", activeRoundId, "reports", teamKey(t)), data);
    activeReports[teamKey(t)] = data;
    // 제출 수 업데이트
    const cnt = Object.keys(activeReports).length;
    await setDoc(doc(db, "rounds", activeRoundId), { submittedCount: cnt }, { merge: true });
    rounds = rounds.map(r => r.id === activeRoundId ? { ...r, submittedCount: cnt } : r);
    renderTeamGrid();
    renderRoundList();
    showToast('✅ 저장되었습니다!');
  } catch(e) { showToast('저장 실패: ' + e.message, true); }
  setBtnLoading('saveBtn', false, '💾 저장');
}

// ─── 보고서 ──────────────────────────────────────────────
window.renderReport = async function() {
  const body = document.getElementById('reportBody');
  if (!activeRoundId) return;
  body.innerHTML = '<div class="loading">⏳ 불러오는 중...</div>';
  try {
    const snap = await getDocs(collection(db, "rounds", activeRoundId, "reports"));
    const dataMap = {};
    snap.forEach(d => { dataMap[d.id] = d.data(); activeReports[d.id] = d.data(); });
    const entries = TEAMS.filter(t => dataMap[teamKey(t)]);
    if (!entries.length) { body.innerHTML = '<div class="no-data">📭 아직 제출된 보고가 없습니다.</div>'; return; }

    const rTasks = tasks => {
      if (!tasks || !tasks.length) return '<span class="empty-cell">-</span>';
      return '<ul class="task-list">' + tasks.map(task =>
        `<li><div class="task-title-text">▪ ${esc(task.title)}</div>${task.detail?`<div class="task-detail">${esc(task.detail)}</div>`:''}</li>`
      ).join('') + '</ul>';
    };

    let html = `<table><thead><tr>
      <th style="width:120px;">부서명</th>
      <th style="width:28%;">◉ 총장 지시 업무</th>
      <th style="width:28%;">◉ 자체 추진 업무</th>
      <th>보고사항</th>
    </tr></thead><tbody>`;
    entries.forEach(t => {
      const d = dataMap[teamKey(t)];
      html += `<tr>
        <td><div style="font-size:11px;color:#6b7280;">${esc(d.dept)}</div><div style="font-weight:700;">${esc(d.teamName)}</div></td>
        <td>${rTasks(d.presidentTasks)}</td>
        <td>${rTasks(d.selfTasks)}</td>
        <td>${d.reportNote?`<div class="report-note-text">${esc(d.reportNote)}</div>`:'<span class="empty-cell">-</span>'}</td>
      </tr>`;
    });
    body.innerHTML = html + '</tbody></table>';
    renderTeamGrid();
  } catch(e) {
    body.innerHTML = `<div class="no-data">❌ 오류: ${esc(e.message)}</div>`;
  }
}

window.showTab = function(tab) {
  ['rounds','input','report'].forEach(t => {
    document.getElementById('page-'+t).style.display = t===tab ? 'block' : 'none';
    document.getElementById('tab-'+t).className = 'tab' + (t===tab ? ' active' : '');
  });
  if (tab === 'report') renderReport();
}

// 초기화
loadRounds();
</script>
</body>
</html>
